name: Local Gate Policy

on:
  # Cloud CI is intentionally disabled for push/PR.
  # Run local gates via Makefile/script entrypoints.
  workflow_dispatch:

jobs:
  local-gate-policy:
    name: Local Gate Entry Points
    runs-on: ubuntu-24.04
    steps:
      - name: Show local gate commands
        run: |
          echo "Automatic cloud CI is disabled for push/pull_request."
          echo "Run strict gates locally:"
          echo "  make local-gate-fast"
          echo "  make local-gate-full"
