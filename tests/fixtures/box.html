<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: #f0f0f0;
  margin: 16px;
  padding: 0;
}

.card {
  background-color: #ffffff;
  border-radius: 8px;
  box-shadow: 4px 4px 0px #888888;
  padding: 16px;
  margin: 16px;
  width: 200px;
}

.title {
  color: #111111;
  font-size: 18px;
  font-weight: bold;
}

.body {
  color: #444444;
  font-size: 14px;
}

.accent {
  background-color: #4a90e2;
  border-radius: 4px;
  color: #ffffff;
  font-size: 12px;
  padding: 4px;
  margin-top: 8px;
  display: inline-block;
}
</style>
</head>
<body>
<div class="card">
  <div class="title">Box Test</div>
  <div class="body">border-radius and box-shadow should both render. The card has 8px rounded corners and a gray drop shadow.</div>
  <div class="accent">accent</div>
</div>
</body>
</html>
