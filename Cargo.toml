[workspace]
members = [
  "silksurf-js",
  "crates/silksurf-app",
  "crates/silksurf-engine",
  "crates/silksurf-html",
  "crates/silksurf-css",
  "crates/silksurf-dom",
  "crates/silksurf-layout",
  "crates/silksurf-render",
  "crates/silksurf-gui",
  "crates/silksurf-net",
  "crates/silksurf-tls",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.83.0"

[workspace.dependencies]
anyhow = "1.0"
bitflags = "2.6"
bitvec = "1.0"
bumpalo = { version = "3.16", features = ["collections"] }
bytemuck = { version = "1.21", features = ["derive"] }
const_format = "0.2"
lasso = "0.7"
libc = "0.2"
memchr = "2.7"
num-traits = "0.2"
once_cell = "1.20"
parking_lot = "0.12"
phf = { version = "0.11", features = ["macros"] }
rkyv = "0.8"
seq-macro = "0.3"
static_assertions = "1.1"
thiserror = "1.0"
tinyvec = { version = "1.8", features = ["alloc"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
unchecked-index = "0.2"
unicode-xid = "0.2"
zerocopy = { version = "0.8", features = ["derive"] }
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.28"
memmap2 = "0.9"
mimalloc = "0.1"
modular-bitfield = "0.11"
paste = "1.0"
pixels = "0.15"
r6502 = "1.1"
ratatui = "0.29"
rayon = "1.10"
ringbuf = "0.4"
simba = "0.9"
soa_derive = "0.13"
sparkline = "0.1"
u4 = "0.1"
wellen = "0.20"
winit = "0.30"
