<!DOCTYPE html>
<html>
<head>
<style>
.full    { border: 2px solid #ff0000; }
.dashed  { border: 1px dashed #00ff00; }
.zero    { border: 0; }
.nocolor { border: 3px dotted; }
</style>
</head>
<body>
<div class="full"    id="a">full border shorthand</div>
<div class="dashed"  id="b">dashed border shorthand</div>
<div class="zero"    id="c">zero border</div>
<div class="nocolor" id="d">no color in shorthand</div>
</body>
</html>
