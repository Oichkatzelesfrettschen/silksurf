<!DOCTYPE html>
<html>
<head>
<style>
.underline    { text-decoration: underline; }
.overline     { text-decoration: overline; }
.line-through { text-decoration: line-through; }
.none         { text-decoration: none; }
</style>
</head>
<body>
<span class="underline"    id="a">underline</span>
<span class="overline"     id="b">overline</span>
<span class="line-through" id="c">line-through</span>
<span class="none"         id="d">no decoration</span>
</body>
</html>
