<!DOCTYPE html>
<html>
<head>
<style>
.solid  { border-style: solid;  border-color: #ff0000; }
.dashed { border-style: dashed; border-color: #00ff00; }
.dotted { border-style: dotted; border-color: #0000ff; }
.none   { border-style: none;   border-color: transparent; }
.double { border-style: double; border-color: #333333; }
</style>
</head>
<body>
<div class="solid"  id="a">solid red border</div>
<div class="dashed" id="b">dashed green border</div>
<div class="dotted" id="c">dotted blue border</div>
<div class="none"   id="d">no border</div>
<div class="double" id="e">double dark border</div>
</body>
</html>
