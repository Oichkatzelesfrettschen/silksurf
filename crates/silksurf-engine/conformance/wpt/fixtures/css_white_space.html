<!DOCTYPE html>
<html>
<head>
<style>
.normal   { white-space: normal; }
.nowrap   { white-space: nowrap; }
.pre      { white-space: pre; }
.pre-wrap { white-space: pre-wrap; }
.pre-line { white-space: pre-line; }
</style>
</head>
<body>
<div class="normal"   id="a">normal</div>
<div class="nowrap"   id="b">nowrap</div>
<div class="pre"      id="c">pre</div>
<div class="pre-wrap" id="d">pre-wrap</div>
<div class="pre-line" id="e">pre-line</div>
</body>
</html>
