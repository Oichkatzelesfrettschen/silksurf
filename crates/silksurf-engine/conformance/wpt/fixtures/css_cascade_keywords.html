<!DOCTYPE html>
<html>
<head>
<style>
.parent { color: red; display: flex; }
#inherit-color   { color: inherit; }
#inherit-display { display: inherit; }
#initial-color   { color: initial; }
#unset-color     { color: unset; }
#unset-display   { display: unset; }
</style>
</head>
<body>
<div class="parent">
  <div id="inherit-color">inherit-color</div>
  <div id="inherit-display">inherit-display</div>
  <div id="initial-color">initial-color</div>
  <div id="unset-color">unset-color</div>
  <div id="unset-display">unset-display</div>
</div>
</body>
</html>
