<!DOCTYPE html>
<html>
<head>
<style>
.grad-angle { background-image: linear-gradient(90deg, red, blue); }
.grad-dir   { background-image: linear-gradient(to right, #ff0000, #0000ff); }
.grad-def   { background-image: linear-gradient(red, blue); }
.grad-pos   { background-image: linear-gradient(0deg, red 0%, blue 100%); }
</style>
</head>
<body>
<div class="grad-angle" id="a">angle</div>
<div class="grad-dir"   id="b">direction</div>
<div class="grad-def"   id="c">default</div>
<div class="grad-pos"   id="d">position</div>
</body>
</html>
