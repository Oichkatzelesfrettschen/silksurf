<!DOCTYPE html>
<html>
<head>
<style>
.visible  { visibility: visible; }
.hidden   { visibility: hidden; }
.collapse { visibility: collapse; }
</style>
</head>
<body>
<div class="visible"  id="a">visible</div>
<div class="hidden"   id="b">hidden</div>
<div class="collapse" id="c">collapse</div>
</body>
</html>
