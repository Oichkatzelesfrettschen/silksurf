<!DOCTYPE html>
<html>
<head>
<style>
html { font-size: 20px; }
body { font-size: 1rem; }
.em1   { font-size: 2em; }
.em2   { margin-left: 1.5em; }
.rem1  { font-size: 1.5rem; }
.rem2  { padding-top: 2rem; }
</style>
</head>
<body>
<div class="em1"  id="a">2em font-size</div>
<div class="em2"  id="b">1.5em margin-left</div>
<div class="rem1" id="c">1.5rem font-size</div>
<div class="rem2" id="d">2rem padding-top</div>
</body>
</html>
