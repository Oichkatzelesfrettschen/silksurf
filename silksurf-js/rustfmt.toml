# silksurf-js rustfmt configuration -- stable-rustfmt compatible.
#
# WHY: AD-008 migrated the workspace to stable Rust. Stable rustfmt rejects
# nightly-only options with warnings, and the prior config had many of them.
# This file is the pruned, stable-compatible subset; nightly-only knobs were
# removed rather than kept-and-warned.
#
# Run with:   cargo fmt
# Check with: cargo fmt -- --check
# (the local-gate fast pass invokes the check form)
#
# To re-introduce a nightly-only option, first amend AD-008 to permit a
# nightly rustfmt for this crate, then add the option back here.

# Edition is stable; matches workspace.package.edition in the root Cargo.toml.
edition = "2024"

# Indentation and width.
hard_tabs = false
tab_spaces = 4
max_width = 100

# Imports.
reorder_imports = true
reorder_modules = true

# Functions and methods.
fn_params_layout = "Tall"

# Match arms.
match_arm_leading_pipes = "Never"

# Field init shorthand and try operator shorthand.
use_field_init_shorthand = true
use_try_shorthand = true

# Newline style.
newline_style = "Unix"

# Remove nested parens where unambiguous.
remove_nested_parens = true

# Combine consecutive #[derive(...)] attributes.
merge_derives = true
