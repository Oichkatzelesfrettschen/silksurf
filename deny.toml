# Workspace-wide cargo-deny policy for SilkSurf

[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "wasm32-unknown-unknown",
]
all-features = false
exclude-dev = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Both ignores are "unmaintained" informational advisories, not CVEs:
    # each has `informational = "unmaintained"` and `patched = []` (no fixed
    # version exists). boa_engine 0.21.1 and cosmic-text 0.19.0 are the LATEST
    # published versions (verified 2026-07-11), so there is no upgrade that
    # clears them; the fix requires the UPSTREAM crates to drop the transitive
    # dep, or migrating off the engine/text stack. Neither is a security
    # regression. Reaching zero ignores is therefore gated on upstream, not on
    # us -- see AD-022 amendment and docs/design/THREAT-MODEL.md.
    #
    # paste (proc-macro) via boa_engine 0.21.1 -> boa_string. Migration target:
    # pastey (a paste fork), but it publishes under a different crate name, so
    # a drop-in [patch] is not available.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained-only (no CVE, patched=[]); transitive via boa_engine 0.21.1 (latest); no upgrade clears it; target pastey not drop-in" },
    # ttf-parser via cosmic-text 0.19.0 -> fontdb 0.23.0. Migration target:
    # skrifa/fontations, but its API differs from ttf-parser, so fontdb (not us)
    # must migrate first.
    { id = "RUSTSEC-2026-0192", reason = "unmaintained-only (no CVE, patched=[]); transitive via cosmic-text 0.19.0 (latest) -> fontdb; no upgrade clears it; target skrifa not API-compatible in fontdb" },
]

[licenses]
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "CC0-1.0",
  "BSL-1.0",
]
exceptions = []

[licenses.private]
ignore = true
registries = []

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"
highlight = "all"
deny = [
  { crate = "openssl", use-instead = "rustls" },
  { crate = "openssl-sys", use-instead = "rustls" },
  { crate = "git2", use-instead = "gix" },
  { crate = "libgit2-sys", use-instead = "gix" },
  { crate = "atty", use-instead = "std::io::IsTerminal" },
  { crate = "ansi_term", use-instead = "owo-colors or yansi" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[output]
feature-depth = 1
